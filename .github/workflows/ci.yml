name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --locked

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: vulture (dead code)
        run: uv run vulture meeple

      - name: deptry (unused deps)
        run: uv run deptry .

      - name: import-linter (seam contract)
        run: uv run lint-imports

      - name: pytest (+ coverage gate)
        run: uv run pytest

      - name: frontend build
        run: npm run build
        working-directory: frontend

      - name: frontend lint
        run: npm run lint
        working-directory: frontend

      - name: frontend test
        run: npm test
        working-directory: frontend

      - name: installed wheel startup smoke test
        run: |
          uv build --wheel --out-dir dist
          cd /tmp
          uv run --isolated --with "$GITHUB_WORKSPACE/dist/meeple-0.1.0-py3-none-any.whl" python -c \
            "from meeple.web.app import FRONTEND_DIST; from meeple.serve import make_app; assert FRONTEND_DIST.is_dir(); make_app()"
